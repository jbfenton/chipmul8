name: 📦 Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Install uv
        uses: astral-sh/setup-uv@v7

      - name: 🏗️ Build package
        run: uv build

      - name: 🚀 Publish to PyPI
        run: uv publish --trusted-publishing always
