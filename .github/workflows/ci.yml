name: 🔍 CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Install SDL2 and system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libfreetype6-dev

      - name: 🔧 Install uv
        uses: astral-sh/setup-uv@v7

      - name: 📐 Check formatting
        run: uv run ruff format --check .

      - name: 🧹 Check linting
        run: uv run ruff check .

  typecheck:
    name: 🔎 Type check
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Install SDL2 and system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libfreetype6-dev

      - name: 🔧 Install uv
        uses: astral-sh/setup-uv@v7

      - name: 🔎 Run mypy
        run: uv run mypy src/

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Install SDL2 and system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libfreetype6-dev

      - name: 🔧 Install uv
        uses: astral-sh/setup-uv@v7

      - name: 🧪 Run tests
        run: uv run python -m unittest discover -s test -t .
