name: 🔍 CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Install uv
        uses: astral-sh/setup-uv@v6

      - name: 📐 Check formatting
        run: uv run ruff format --check .

      - name: 🧹 Check linting
        run: uv run ruff check .

  typecheck:
    name: 🔎 Type check
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Install uv
        uses: astral-sh/setup-uv@v6

      - name: 🔎 Run mypy
        run: uv run mypy src/

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Install uv
        uses: astral-sh/setup-uv@v6

      - name: 🧪 Run tests
        run: uv run python -m unittest discover -s test -t .
